# Tomcat
server:
  port: 9002
  tomcat:
    max-swallow-size: -1
    max-http-form-post-size: 200MB
    connection-timeout: 300000

# Spring
spring:
  application:
    # 应用名称
    name: hongshu-web
  profiles:
    # 环境配置
    active: dev
  config:
    import:
      - optional:nacos:application-${spring.profiles.active}.yml?group=DEFAULT_GROUP&refresh=true
      - optional:nacos:${spring.application.name}-${spring.profiles.active}.yml?group=DEFAULT_GROUP&refresh=true
      - optional:classpath:application-rocketmq.yml
  servlet:
    multipart:
      enabled: true
      max-file-size: 200MB
      max-request-size: 500MB

  cloud:
    nacos:
      discovery:
        # 服务注册地址
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      config:
        # 配置中心地址
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        # 配置文件格式
        file-extension: yml
        # 共享配置
        shared-configs:
          - application-${spring.profiles.active}.${spring.cloud.nacos.config.file-extension}
          - application-redis.${spring.cloud.nacos.config.file-extension}
          - application-rocketmq.${spring.cloud.nacos.config.file-extension}
  mvc:
    async:
      request-timeout: 300000

feign:
  okhttp:
    enabled: false
