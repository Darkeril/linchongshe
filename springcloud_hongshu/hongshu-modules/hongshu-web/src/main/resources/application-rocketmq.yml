# RocketMQ 配置
# 使用方法：
# 1. 启动 RocketMQ NameServer: sh bin/mqnamesrv
# 2. 启动 RocketMQ Broker: sh bin/mqbroker -n localhost:9876
# 3. 在 bootstrap.yml 中添加此配置文件到 shared-configs
# 4. 取消 LikeCollectionConsumerService 中的 @RocketMQMessageListener 注释

rocketmq:
  # NameServer 地址，多个用分号分隔
  name-server: 127.0.0.1:9876
  
  # 生产者配置
  producer:
    # 生产者组名
    group: like-collection-producer-group
    # 发送消息超时时间（毫秒）
    send-message-timeout: 3000
    # 消息最大长度（字节）
    max-message-size: 4194304
    # 发送失败重试次数
    retry-times-when-send-failed: 2
    # 异步发送失败重试次数
    retry-times-when-send-async-failed: 2
    # 在发送之前，是否压缩消息体
    compress-message-body-threshold: 4096
    # 是否在内部发送失败时重试另一个broker
    retry-next-server: true
  
  # 消费者配置（全局默认值）
  consumer:
    # 消费者组名（可被 @RocketMQMessageListener 覆盖）
    group: default-consumer-group
    # 消费模式：CONCURRENTLY（并发）或 ORDERLY（顺序）
    message-model: CONCURRENTLY
    # 消费线程数
    consume-thread-min: 20
    consume-thread-max: 64
    # 批量消费消息数量
    consume-message-batch-max-size: 1
    # 拉取消息间隔（毫秒）
    pull-interval: 1000
    # 拉取消息数量
    pull-batch-size: 32


