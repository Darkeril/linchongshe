# Tomcat
server:
  port: 8080

# Spring
spring:
  application:
    # 应用名称
    name: hongshu-gateway
  main:
    # 强制使用响应式 WebFlux，避免因类路径含 servlet 依赖被判定为 servlet 模式
    web-application-type: reactive
  profiles:
    # 环境配置
    active: dev
  config:
    import:
      - optional:nacos:application-${spring.profiles.active}.yml?group=DEFAULT_GROUP&refresh=true
      - optional:nacos:${spring.application.name}-${spring.profiles.active}.yml?group=DEFAULT_GROUP&refresh=true
  cloud:
    nacos:
      discovery:
        # 服务注册地址
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      config:
        # 配置中心地址
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        # 配置文件格式
        file-extension: yml
        # 共享配置
        shared-configs:
          - application-${spring.profiles.active}.${spring.cloud.nacos.config.file-extension}
    sentinel:
      # 取消控制台懒加载
      eager: true
      transport:
        # 控制台地址
        dashboard: 127.0.0.1:8718
      # nacos配置持久化
      datasource:
        ds1:
          nacos:
            server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
            dataId: sentinel-hongshu-gateway
            groupId: DEFAULT_GROUP
            data-type: json
            rule-type: gw-flow
