# 仅包含基础设施服务的 Docker Compose 配置
# 用于快速启动基础设施，微服务可以在宿主机运行

services:
  # Redis 缓存
  redis:
    image: redis:latest
    container_name: hongshu-redis
    restart: always
    ports:
      - "6379:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-Myj950501}
      TZ: Asia/Shanghai
    volumes:
      - ./redis/conf/redis.conf:/etc/redis/redis.conf
      - ./redis/data:/data
    command: redis-server /etc/redis/redis.conf --requirepass ${REDIS_PASSWORD:-Myj950501}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-Myj950501}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nacos 配置中心
  nacos:
    image: nacos/nacos-server:v2.3.0-slim
    container_name: hongshu-nacos
    restart: always
    ports:
      - "8848:8848"    # HTTP API
      - "9848:9848"   # gRPC 端口
    environment:
      MODE: standalone
      JVM_XMS: 512m
      JVM_XMX: 512m
      TZ: Asia/Shanghai
    volumes:
      - ./nacos/logs:/home/nacos/logs
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8848/nacos/" ]
      interval: 15s
      timeout: 10s
      retries: 10

  # Elasticsearch 搜索引擎
  elasticsearch:
    image: elasticsearch:8.0.0
    container_name: hongshu-elasticsearch
    restart: always
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: -Xms512m -Xmx512m
      # 禁用安全认证
      xpack.security.enabled: false
      xpack.security.enrollment.enabled: false
      TZ: Asia/Shanghai
    volumes:
      - ./elasticsearch/data:/usr/share/elasticsearch/data
      - ./elasticsearch/logs:/usr/share/elasticsearch/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # RocketMQ NameServer
  rocketmq-namesrv:
    image: rocketmqinc/rocketmq:latest
    container_name: hongshu-rocketmq-namesrv
    restart: always
    ports:
      - "9876:9876"
    environment:
      JAVA_OPT_EXT: -Xms256m -Xmx256m
      TZ: Asia/Shanghai
    volumes:
      - ./rocketmq/namesrv/logs:/home/rocketmq/logs
    command: sh mqnamesrv

  # RocketMQ Broker
  rocketmq-broker:
    image: rocketmqinc/rocketmq:latest
    container_name: hongshu-rocketmq-broker
    restart: always
    ports:
      - "10909:10909"
      - "10911:10911"
    environment:
      NAMESRV_ADDR: rocketmq-namesrv:9876
      JAVA_OPT_EXT: -Xms512m -Xmx512m
      TZ: Asia/Shanghai
    volumes:
      - ./rocketmq/broker/logs:/home/rocketmq/logs
      - ./rocketmq/broker/store:/home/rocketmq/store
      - ./rocketmq/broker/conf/broker.conf:/home/rocketmq/conf/broker.conf
    command: sh mqbroker -c /home/rocketmq/conf/broker.conf
    depends_on:
      - rocketmq-namesrv
