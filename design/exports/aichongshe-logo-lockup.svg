    <path d="M12.5 10c-3.2 0-5.8 2.6-5.8 5.4 0 2 1.6 3.6 3.6 3.6 1.1 0 2-0.5 2.2-0.5 0.2 0 1.1 0.5 2.2 0.5 2 0 3.6-1.6 3.6-3.6 0-2.8-2.6-5.4-5.8-5.4z"/>
  </g>
  <text x="312" y="154" fill="#231710" font-family="Baloo 2, ZCOOL KuaiLe, Noto Sans SC, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="88" font-weight="800" letter-spacing="4">爱宠社</text>
  <text x="318" y="208" fill="#63463A" font-family="Noto Sans SC, PingFang SC, Helvetica Neue, Arial, sans-serif" font-size="27" font-weight="500" letter-spacing="2">和毛孩子一起，分享每一天</text>
