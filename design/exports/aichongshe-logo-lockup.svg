<svg xmlns="http://www.w3.org/2000/svg" width="960" height="320" viewBox="0 0 960 320" role="img" aria-labelledby="title desc">
  <title id="title">Aichongshe logo lockup</title>
  <desc id="desc">Aichongshe warm coffee paw badge with Chinese wordmark.</desc>
  <defs>
    <linearGradient id="badgeGradient" x1="56" y1="56" x2="264" y2="264" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#C97B4A"/>
      <stop offset="1" stop-color="#8A4A1F"/>
    </linearGradient>
    <clipPath id="badgeClip">
      <circle cx="160" cy="160" r="104"/>
    </clipPath>
    <linearGradient id="topHighlight" x1="160" y1="61" x2="160" y2="144" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.36"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <circle cx="160" cy="160" r="104" fill="url(#badgeGradient)"/>
  <ellipse cx="160" cy="86" rx="79" ry="32" fill="url(#topHighlight)" clip-path="url(#badgeClip)"/>
  <g fill="#FFFFFF" transform="translate(89.5 89.5) scale(5.875)">
